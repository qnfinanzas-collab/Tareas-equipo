<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#7F77DD" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Kluxor" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <!-- Cormorant Garamond: serif elegante para títulos editoriales (Home,
         visor de documentos del Consejo). preconnect a fonts.gstatic acelera
         el primer paint. display=swap evita FOIT — el texto aparece con
         la fuente del sistema y se reemplaza al cargar Cormorant. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap">
    <title>Kluxor</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; width: 100%; }
      body {
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        -webkit-tap-highlight-color: transparent;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior-y: none;
      }
      input, textarea, select, button { font-size: 16px; } /* evita zoom en iOS */
      @media (min-width: 700px){ input, textarea, select, button { font-size: inherit; } }

      @keyframes tf-slide-in-right { from { transform: translateX(100%); } to { transform: translateX(0); } }
      @keyframes tf-fade-in { from { opacity: 0; } to { opacity: 1; } }
      @keyframes tf-slide-down { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes tf-palette-in { from { opacity: 0; transform: translateX(-50%) scale(0.97); } to { opacity: 1; transform: translateX(-50%) scale(1); } }
      @keyframes tf-card-in { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes tf-mic-pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(226,75,74,0.55); } 50% { box-shadow: 0 0 0 8px rgba(226,75,74,0); } }
      @keyframes tf-speak-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.65; transform: scale(1.06); } }
      .tf-press:active { transform: scale(0.95); }
      .tf-lift { transition: transform .15s ease, box-shadow .15s ease; }
      .tf-lift:hover { transform: translateY(-2px); }
      /* Kanban task cards — hover sutil solo con sombra, sin transform.
         Estilo Trello/Kluxor: cambio leve de elevación al pasar el ratón
         para indicar interacción sin saltos bruscos. */
      .tf-task-card { transition: box-shadow .18s ease; }
      .tf-task-card:hover { box-shadow: 0 2px 6px rgba(26,26,26,0.07); }

      /* Kanban scroll interno de columnas — momentum scroll iOS Safari
         antiguo (≤15). Modernos ya lo hacen por defecto pero esta
         declaración no hace daño y blinda compatibilidad. La clase se
         aplica al div interior de tareas dentro de cada columna. */
      .tf-task-list {
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
      }

      /* App root height — usa 100dvh (dynamic viewport, excluye URL bar
         en iOS Safari 15.4+) con fallback a 100vh para navegadores
         antiguos. Sin esto, en iOS el contenido se ocultaba detrás de
         la URL bar y el scroll interno de columnas no llegaba al final. */
      .tf-app-root {
        height: 100vh;
        height: 100dvh;
      }

      /* Móvil ≤768px — DailyDigest banner ultra-compacto: una sola línea
         con saludo y filtro Persona. Oculta subtítulo, chips críticos y
         botón cerrar para liberar espacio vertical (el board en móvil
         necesita cada píxel). El avatar se hace más pequeño. */
      @media (max-width: 768px) {
        [data-tf-banner="daily-digest"] {
          padding: 6px 10px !important;
          gap: 8px !important;
          margin: 6px 10px 0 !important;
        }
        [data-tf-banner="daily-digest"] [data-dd="avatar"] {
          width: 26px !important;
          height: 26px !important;
          font-size: 10px !important;
        }
        [data-tf-banner="daily-digest"] [data-dd="subtitle"],
        [data-tf-banner="daily-digest"] [data-dd="critical-chips"],
        [data-tf-banner="daily-digest"] [data-dd="close"] {
          display: none !important;
        }
        [data-tf-banner="daily-digest"] [data-dd="text-block"] {
          display: flex !important;
          flex-direction: row !important;
          align-items: center !important;
          gap: 8px !important;
          flex-wrap: wrap !important;
        }
        [data-tf-banner="daily-digest"] [data-dd="greeting"] {
          font-size: 12px !important;
        }
        [data-tf-banner="daily-digest"] [data-dd="persona-row"] {
          margin-top: 0 !important;
        }
        [data-tf-banner="daily-digest"] [data-dd="persona-label"] {
          display: none;
        }
      }

      /* Command Palette trigger button */
      .tf-search-btn { display: flex; }
      .tf-search-label, .tf-search-kbd { display: inline; }
      @media (max-width: 768px){
        .tf-search-label, .tf-search-kbd { display: none; }
        .tf-search-btn { padding: 0 !important; width: 38px; height: 38px; border-radius: 50% !important; justify-content: center; }
      }
      /* Hamburger button solo en móvil */
      .tf-only-mobile { display: flex; }
      @media (min-width: 901px){ .tf-only-mobile { display: none !important; } }

      /* Responsive: sidebar drawer en móvil (breakpoint bajado a 600px —
         antes 900px, lo que ocultaba el sidebar en ventanas Mac estrechas
         dejando al usuario sin navegación). El toggle del header sirve
         de respaldo cuando el ancho aprieta. */
      .tf-sidebar { transition: transform .2s ease; }
      .tf-backdrop { display: none; }
      @media (max-width: 600px){
        .tf-sidebar {
          position: fixed !important;
          inset: 0 auto 0 0;
          z-index: 1800;
          width: 260px !important;
          transform: translateX(-100%);
          box-shadow: 0 0 40px rgba(0,0,0,0.2);
        }
        .tf-sidebar.open { transform: translateX(0); }
        .tf-backdrop {
          display: block;
          position: fixed; inset: 0;
          background: rgba(0,0,0,0.4);
          z-index: 1700;
        }
        .tf-hamburger { display: flex !important; }
        .tf-dashboard-grid-2 { grid-template-columns: 1fr !important; }
        .tf-main-pad { padding-left: 12px !important; padding-right: 12px !important; }
      }
      @media (max-width: 600px){
        .tf-overlay { padding: 0 !important; align-items: stretch !important; }
        .tf-modal {
          width: 100% !important; max-width: 100% !important;
          height: 100% !important; max-height: 100% !important;
          border-radius: 0 !important; margin: 0 !important;
        }
        .tf-board-col { width: 82vw !important; min-width: 82vw !important; }
        .tf-kpi-grid { grid-template-columns: 1fr 1fr !important; }
        .tf-fab { bottom: 16px !important; right: 16px !important; }
      }

      /* Bottom navigation (mobile only). Aditiva: el sidebar drawer
         sigue accesible con la hamburguesa para rutas avanzadas; este
         bottom nav cubre las 4 rutas más usadas con tap directo.
         Altura: 64px de contenido + safe-area-inset-bottom para iPhone
         con notch. ANTES estaba 64px total + padding inside, lo que
         dejaba solo ~30px de área útil en iPhone y solapaba iconos. */
      .tf-bottom-nav { display: none; }
      @media (max-width: 768px) {
        .tf-bottom-nav {
          display: flex;
          flex-direction: row;
          align-items: stretch;
          position: fixed;
          bottom: 0; left: 0; right: 0;
          height: calc(64px + env(safe-area-inset-bottom));
          padding-bottom: env(safe-area-inset-bottom);
          background: #ffffff;
          border-top: 1px solid #e5e7eb;
          z-index: 1000;
          box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
          width: 100%;
          overflow: hidden;
          box-sizing: border-box;
        }
        [data-tf="main-content"] {
          padding-bottom: calc(64px + env(safe-area-inset-bottom)) !important;
        }
      }
      .tf-bottom-nav-item {
        flex: 1 1 0;
        min-width: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 64px;
        background: transparent;
        border: none;
        cursor: pointer;
        font-family: inherit;
        color: #6B7280;
        opacity: 0.5;
        transition: opacity .15s, color .15s;
        padding: 6px 4px;
        box-sizing: border-box;
        overflow: hidden;
      }
      .tf-bottom-nav-item.active { opacity: 1; color: #7F77DD; font-weight: 600; }
      /* display:block forzado en spans (sin gap, usamos margin-top en
         label — gap en flex-column falla en Safari iOS <14). line-height:1
         evita altura extra del glyph emoji. */
      .tf-bottom-nav-item .tf-bn-icon  { display: block; font-size: 22px; line-height: 1; }
      .tf-bottom-nav-item .tf-bn-label { display: block; font-size: 10px; line-height: 1.1; letter-spacing: 0.02em; margin-top: 4px; white-space: nowrap; }

      /* HD-v2 (sidebar-fix): Selectores acotados a [data-tf="main-content"]
         para garantizar que jamás bajen al sidebar — el sidebar es HERMANO
         de main-content, no descendiente, así que ya no podía verse afectado
         antes; este prefijo lo deja explícito en código y blinda contra
         futuros refactors que muevan los data-tf-bar a otros sitios. */
      [data-tf="main-content"][data-tf-tab="hector-direct"] [data-tf-bar="project-header"],
      [data-tf="main-content"][data-tf-tab="hector-direct"] [data-tf-bar="project-tabs"] {
        display: none !important;
      }

      /* HD-v3 (sidebar-fix): mismo blindaje para el FAB micrófono. */
      [data-tf="main-content"][data-tf-tab="hector-direct"] [data-hd="mic-btn"] {
        display: none !important;
      }

      /* Salvavidas: el sidebar global NUNCA debe ser ocultado por las reglas
         de la vista hector-direct. Si en algún momento alguien añade un
         data-tf-bar dentro del sidebar por error, esta regla lo restablece. */
      .tf-sidebar { display: flex !important; }

      /* Kluxor theme operacional — bottom nav cuando estamos en HectorDirect.
         Tema claro: fondo blanco roto cálido, ítem activo en oro Kluxor,
         ítems inactivos gris claro. Scoped con :has() (Safari iOS 15.4+)
         para no afectar otras vistas. */
      body:has([data-tf-tab="hector-direct"]) .tf-bottom-nav {
        background: #FAFAF7 !important;
        border-top: 0.5px solid #E5E0D5 !important;
        box-shadow: 0 -2px 8px rgba(26,26,26,0.04) !important;
      }
      body:has([data-tf-tab="hector-direct"]) .tf-bottom-nav-item {
        color: #9B9B9B !important;
        opacity: 1 !important;
      }
      body:has([data-tf-tab="hector-direct"]) .tf-bottom-nav-item.active {
        color: #C9A84C !important;
        font-weight: 500 !important;
      }

      /* Print: ocultar navegación y dejar solo el contenido marcado con .tf-printable.
         Si no hay ningún .tf-printable, imprime el main visible. */
      @media print {
        .tf-sidebar, .tf-backdrop, .tf-topbar, .tf-fab, .tf-no-print, .tf-bottom-nav { display: none !important; }
        body, #root { background: #fff !important; }
        .tf-main-pad { padding: 0 !important; }
        .tf-printable { box-shadow: none !important; border: none !important; }
        @page { size: A4; margin: 15mm; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
