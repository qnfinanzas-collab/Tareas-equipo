<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#7F77DD" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TaskFlow" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>TaskFlow</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; width: 100%; }
      body {
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        -webkit-tap-highlight-color: transparent;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior-y: none;
      }
      input, textarea, select, button { font-size: 16px; } /* evita zoom en iOS */
      @media (min-width: 700px){ input, textarea, select, button { font-size: inherit; } }

      /* Responsive: sidebar drawer en móvil */
      .tf-sidebar { transition: transform .2s ease; }
      .tf-backdrop { display: none; }
      @media (max-width: 900px){
        .tf-sidebar {
          position: fixed !important;
          inset: 0 auto 0 0;
          z-index: 1800;
          width: 260px !important;
          transform: translateX(-100%);
          box-shadow: 0 0 40px rgba(0,0,0,0.2);
        }
        .tf-sidebar.open { transform: translateX(0); }
        .tf-backdrop {
          display: block;
          position: fixed; inset: 0;
          background: rgba(0,0,0,0.4);
          z-index: 1700;
        }
        .tf-hamburger { display: flex !important; }
        .tf-dashboard-grid-2 { grid-template-columns: 1fr !important; }
        .tf-main-pad { padding-left: 12px !important; padding-right: 12px !important; }
      }
      @media (max-width: 600px){
        .tf-modal { width: 100vw !important; max-width: 100vw !important; height: 100vh !important; max-height: 100vh !important; border-radius: 0 !important; }
        .tf-board-col { width: 82vw !important; min-width: 82vw !important; }
        .tf-kpi-grid { grid-template-columns: 1fr 1fr !important; }
        .tf-fab { bottom: 16px !important; right: 16px !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
