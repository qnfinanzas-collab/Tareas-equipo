<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#7F77DD" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SoulBaric" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>SoulBaric</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; width: 100%; }
      body {
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        -webkit-tap-highlight-color: transparent;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior-y: none;
      }
      input, textarea, select, button { font-size: 16px; } /* evita zoom en iOS */
      @media (min-width: 700px){ input, textarea, select, button { font-size: inherit; } }

      @keyframes tf-slide-in-right { from { transform: translateX(100%); } to { transform: translateX(0); } }
      @keyframes tf-fade-in { from { opacity: 0; } to { opacity: 1; } }
      @keyframes tf-slide-down { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes tf-palette-in { from { opacity: 0; transform: translateX(-50%) scale(0.97); } to { opacity: 1; transform: translateX(-50%) scale(1); } }
      @keyframes tf-card-in { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes tf-mic-pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(226,75,74,0.55); } 50% { box-shadow: 0 0 0 8px rgba(226,75,74,0); } }
      @keyframes tf-speak-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.65; transform: scale(1.06); } }
      .tf-press:active { transform: scale(0.95); }
      .tf-lift { transition: transform .15s ease, box-shadow .15s ease; }
      .tf-lift:hover { transform: translateY(-2px); }

      /* Command Palette trigger button */
      .tf-search-btn { display: flex; }
      .tf-search-label, .tf-search-kbd { display: inline; }
      @media (max-width: 768px){
        .tf-search-label, .tf-search-kbd { display: none; }
        .tf-search-btn { padding: 0 !important; width: 38px; height: 38px; border-radius: 50% !important; justify-content: center; }
      }
      /* Hamburger button solo en móvil */
      .tf-only-mobile { display: flex; }
      @media (min-width: 901px){ .tf-only-mobile { display: none !important; } }

      /* Responsive: sidebar drawer en móvil */
      .tf-sidebar { transition: transform .2s ease; }
      .tf-backdrop { display: none; }
      @media (max-width: 900px){
        .tf-sidebar {
          position: fixed !important;
          inset: 0 auto 0 0;
          z-index: 1800;
          width: 260px !important;
          transform: translateX(-100%);
          box-shadow: 0 0 40px rgba(0,0,0,0.2);
        }
        .tf-sidebar.open { transform: translateX(0); }
        .tf-backdrop {
          display: block;
          position: fixed; inset: 0;
          background: rgba(0,0,0,0.4);
          z-index: 1700;
        }
        .tf-hamburger { display: flex !important; }
        .tf-dashboard-grid-2 { grid-template-columns: 1fr !important; }
        .tf-main-pad { padding-left: 12px !important; padding-right: 12px !important; }
      }
      @media (max-width: 600px){
        .tf-overlay { padding: 0 !important; align-items: stretch !important; }
        .tf-modal {
          width: 100% !important; max-width: 100% !important;
          height: 100% !important; max-height: 100% !important;
          border-radius: 0 !important; margin: 0 !important;
        }
        .tf-board-col { width: 82vw !important; min-width: 82vw !important; }
        .tf-kpi-grid { grid-template-columns: 1fr 1fr !important; }
        .tf-fab { bottom: 16px !important; right: 16px !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
